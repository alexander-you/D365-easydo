<!DOCTYPE html>
<!--
  easydo - Send Wizard (HTML web resource, hosted in a model-driven SIDE PANE)

  Opened by EasyDo.FormSend.launch via Xrm.App.sidePanes.createPane(...).navigate(
  { pageType:"webresource", webresourceName:"alex_/html/sendWizard.html",
    data:"entityName=..&recordId=..&recordName=..&uilang=..&paneId=.." }).

  Because the web resource is served from the ORG domain it is SAME-ORIGIN with
  the app, so it has native Xrm.WebApi (no premium connector, unlike a canvas
  custom page). It reads the active signature templates itself, runs the 4-step
  wizard, and on submit creates ONE alex_signaturerequest row with the wizard
  JSON in alex_wizardpayload. The server-side WizardIntakePlugin turns that JSON
  into the real request (template lookup, recipients, Ready-to-Send), exactly as
  before. Fully bilingual EN/HE with RTL.
-->

                if (children) children.forEach(function (c) { n.appendChild(c); });
                return n;
            }

            function getXrm() {
                try { if (window.Xrm && window.Xrm.WebApi) return window.Xrm; } catch (e) { }
                try { if (window.parent && window.parent.Xrm && window.parent.Xrm.WebApi) return window.parent.Xrm; } catch (e) { }
                return null;
            }

            function parseContext() {
                var ctx = { entityName: "", recordId: "", recordName: "", uilang: "", paneId: "" };
                try {
                    var raw = new URLSearchParams(window.location.search).get("data") || "";
                    var parts = new URLSearchParams(raw);
                    ctx.entityName = parts.get("entityName") || "";
                    ctx.recordId = (parts.get("recordId") || "").replace(/[{}]/g, "");
                    ctx.recordName = parts.get("recordName") || "";
                    ctx.uilang = parts.get("uilang") || "";
                    ctx.paneId = parts.get("paneId") || "";
                } catch (e) { }
                return ctx;
            }

            function Wizard(root) {
                this.root = root;
                this.lang = "he";
                this.step = 0;
                this.stepKeys = ["template", "recipients", "settings", "review"];
                this.templates = [];
                this.selectedTemplateId = "";
                this.recipients = [];
                this.isDraft = false;
                this.docLang = "he";
                this.demo = false;
                this.submitted = false;
                this.fields = [];
                this.fieldsLoadedFor = null;
                this.fieldsLoading = false;
                this.launchContact = null;
                // Global send settings (loaded from alex_easydosettings). Until loaded
                // the feature is treated as off (email only).
                this.settings = { multiChannel: false, allowEmail: true, allowSms: false, allowWhatsApp: false };
                // Per-send chosen notification channels.
                this.channels = { email: true, sms: false, whatsapp: false };
                this.ctx = parseContext();
                this.xrm = getXrm();
            }

            Wizard.prototype.start = function () {
                var self = this;
                this.lang = this.ctx.uilang === "he" || this.ctx.uilang === "en" ? this.ctx.uilang : this.detectLang();
                this.docLang = this.lang;
                // Render immediately with a light skeleton while data loads.
                this.applyTemplates([]);
                this.render();
                // Load the launch contact (for recipient pre-fill), the templates
                // and the global send settings together, then build the real
                // recipient rows and channel options from all of them.
                Promise.all([this.loadLaunchContact(), this.fetchTemplates(), this.loadSettings()]).then(function (res) {
                    self.launchContact = res[0];
                    self.applySettings(res[2]);
                    self.applyTemplates(res[1], true);
                    self.loadFields();
                    self.render();
                });
            };

            // Read the org-wide send settings singleton (which channels are allowed).
            Wizard.prototype.loadSettings = function () {
                if (!this.xrm) return Promise.resolve(null);
                var q = "?$select=alex_multichannelenabled,alex_allowemail,alex_allowsms,alex_allowwhatsapp&$top=1";
                return this.xrm.WebApi.retrieveMultipleRecords("alex_easydosettings", q).then(
                    function (res) { return (res && res.entities && res.entities[0]) || null; },
                    function () { return null; }
                );
            };

            // Apply the loaded settings and seed the per-send channel choices so only
            // allowed channels start selected (email always wins as the default).
            Wizard.prototype.applySettings = function (row) {
                if (row) {
                    this.settings = {
                        multiChannel: row.alex_multichannelenabled === true,
                        allowEmail: row.alex_allowemail !== false,
                        allowSms: row.alex_allowsms === true,
                        allowWhatsApp: row.alex_allowwhatsapp === true
                    };
                }
                var s = this.settings;
                this.channels = {
                    email: s.multiChannel ? s.allowEmail : true,
                    sms: false,
                    whatsapp: false
                };
            };

            // Read the launch contact's name + email so a recipient slot can be
            // pre-filled automatically (the user should not retype what we know).
            Wizard.prototype.loadLaunchContact = function () {
                var self = this;
                if (!this.xrm || this.ctx.entityName !== "contact" || !this.ctx.recordId) return Promise.resolve(null);
                return this.xrm.WebApi.retrieveRecord("contact", this.ctx.recordId, "?$select=fullname,emailaddress1,mobilephone,telephone1").then(
                    function (rec) {
                        return {
                            id: self.ctx.recordId,
                            name: (rec && rec.fullname) || self.ctx.recordName || "",
                            email: (rec && rec.emailaddress1) || "",
                            phone: (rec && (rec.mobilephone || rec.telephone1)) || ""
                        };
                    },
                    function () { return null; }
                );
            };

            Wizard.prototype.detectLang = function () {
                try {
                    var lcid = this.xrm && this.xrm.Utility
                        ? this.xrm.Utility.getGlobalContext().userSettings.languageId : 0;
                    return lcid === 1037 ? "he" : "en";
                } catch (e) { return "he"; }
            };

            Wizard.prototype.fetchTemplates = function () {
                var self = this;
                var entityName = this.ctx.entityName;
                if (!this.xrm || !entityName) { return Promise.resolve([]); }
                var query = "?$select=alex_signaturetemplateid,alex_name,alex_externaltemplateid,alex_primarytable,alex_allowprefilledit,alex_rolesjson" +
                    "&$filter=alex_isactive eq true and statecode eq 0 and alex_allowsendfromobject eq true" +
                    " and alex_primarytable eq '" + entityName + "'" +
                    "&$orderby=alex_name";
                return this.xrm.WebApi.retrieveMultipleRecords("alex_signaturetemplate", query).then(
                    function (result) {
                        var rows = (result && result.entities) || [];
                        return rows.map(function (r) {
                            return {
                                id: r.alex_signaturetemplateid,
                                externalId: r.alex_externaltemplateid || "",
                                name: r.alex_name || "",
                                primaryTable: r.alex_primarytable || "",
                                allowPrefillEdit: r.alex_allowprefilledit === true,
                                roles: parseRoles(r.alex_rolesjson)
                            };
                        }).filter(function (t) { return t.id && t.name && t.externalId; });
                    },
                    function () { return []; }
                );
            };

            Wizard.prototype.applyTemplates = function (list, forceRecips) {
                this.templates = list || [];
                this.demo = this.templates.length === 0;
                if (this.demo) {
                    this.templates = [
                        { id: "demo-1", externalId: "68729", name: this.lang === "he" ? "הכר את הלקוח" : "Know your customer", primaryTable: "contact", allowPrefillEdit: false, roles: [] },
                        { id: "demo-2", externalId: "68793", name: this.lang === "he" ? "חוזה לדוגמה" : "Sample contract", primaryTable: "contact", allowPrefillEdit: false, roles: [] }
                    ];
                }
                if (!this.selectedTemplateId || !this.templates.some(function (t) { return t.id === this.selectedTemplateId; }, this)) {
                    this.selectedTemplateId = this.templates.length > 0 ? this.templates[0].id : "";
                }
                this.syncRecipientsToTemplate(forceRecips || this.recipients.length === 0);
            };

            // Build the recipient rows to match the selected template's roles.
            // forceReset rebuilds even when rows already exist (used on template switch).
            Wizard.prototype.syncRecipientsToTemplate = function (forceReset) {
                var self = this;
                var tpl = this.findTemplate();
                var roles = namedRoles(tpl);
                this.roleMode = roles.length >= 2;
                var lc = this.launchContact;
                if (this.roleMode) {
                    // One fixed slot per signer role. The first slot is pre-filled
                    // with the launch contact (the user can change it); the rest are
                    // picked from contacts.
                    this.recipients = roles.map(function (r, i) {
                        var pre = (i === 0 && lc && lc.email) ? lc : null;
                        return {
                            name: pre ? pre.name : "", email: pre ? pre.email : "",
                            phone: pre ? (pre.phone || "") : "",
                            contactId: pre ? pre.id : "", roleName: r.name, sequence: r.sequence
                        };
                    });
                    return;
                }
                if (forceReset || this.recipients.length === 0) {
                    if (this.demo) {
                        this.recipients = [{ name: this.lang === "he" ? "דנה לוי" : "Dana Levi", email: "dana@example.com", phone: "0540000000", contactId: "", roleName: "", sequence: 1 }];
                    } else if (lc && lc.email) {
                        this.recipients = [{ name: lc.name, email: lc.email, phone: lc.phone || "", contactId: lc.id, roleName: "", sequence: 1 }];
                    } else {
                        this.recipients = [{ name: "", email: "", phone: "", contactId: "", roleName: "", sequence: 1 }];
                    }
                }
            };

            // The ordered list of step keys for the current selection. The "data"
            // step appears only when the template allows prefill editing AND it has
            // visible editable fields resolved from the record.
            Wizard.prototype.computeSteps = function () {
                var tpl = this.findTemplate();
                var keys = ["template", "recipients"];
                // Show the data step whenever the template has visible prefill
                // fields, regardless of allowPrefillEdit (which only controls whether
                // those fields can be edited here).
                if (tpl && this.fieldsLoadedFor === this.selectedTemplateId && this.fields.length > 0) {
                    keys.push("data");
                }
                keys.push("settings");
                keys.push("review");
                this.stepKeys = keys;
                if (this.step >= keys.length) this.step = keys.length - 1;
                return keys;
            };

            // Load the visible prefill field mappings for the selected template and
            // resolve their current values from the source record, so the data step
            // can show editable inputs. Demo templates and templates without prefill
            // editing are skipped.
            Wizard.prototype.loadFields = function () {
                var self = this;
                var tpl = this.findTemplate();
                this.fields = [];
                // Load visible prefill fields for ANY non-demo template; whether they
                // are editable is decided per field (allowPrefillEdit + iseditable).
                if (!tpl || this.demo || !this.xrm) {
                    this.fieldsLoadedFor = this.selectedTemplateId;
                    return;
                }
                this.fieldsLoading = true;
                this.fieldsLoadedFor = null;
                var loadingFor = this.selectedTemplateId;
                // direction: Prefill (626210000) or Bidirectional (626210002), visible to user.
                var q = "?$select=alex_externalfieldid,alex_externalfieldname,alex_dynamicstable,alex_dynamicsfield," +
                    "alex_lookupfield,alex_iseditablebeforesend,alex_isreadonly,alex_defaultvalue,alex_direction" +
                    "&$filter=_alex_templateid_value eq " + tpl.id +
                    " and alex_isvisibletouser eq true" +
                    " and (alex_direction eq 626210000 or alex_direction eq 626210002)";
                this.xrm.WebApi.retrieveMultipleRecords("alex_templatefieldmapping", q).then(
                    function (res) {
                        var rows = (res && res.entities) || [];
                        var fields = rows.filter(function (r) { return r.alex_externalfieldid; }).map(function (r) {
                            return {
                                externalId: r.alex_externalfieldid,
                                label: r.alex_externalfieldname || r.alex_externalfieldid,
                                table: r.alex_dynamicstable || "",
                                column: r.alex_dynamicsfield || "",
                                hop: r.alex_lookupfield || "",
                                editable: r.alex_iseditablebeforesend === true,
                                readOnly: r.alex_isreadonly === true,
                                value: r.alex_defaultvalue || ""
                            };
                        });
                        self.resolveFieldValues(fields).then(function () {
                            if (loadingFor !== self.selectedTemplateId) return;
                            fields.forEach(function (f) { f.original = f.value; });
                            self.fields = fields;
                            self.fieldsLoadedFor = loadingFor;
                            self.fieldsLoading = false;
                            self.render();
                        });
                    },
                    function () {
                        self.fieldsLoadedFor = loadingFor;
                        self.fieldsLoading = false;
                        self.render();
                    }
                );
            };

            // Best-effort read of each field's value from the launch record. Direct
            // columns (on the launch entity) resolve via one retrieve; lookup-hop
            // fields are left to the server-side resolver and shown empty/editable.
            Wizard.prototype.resolveFieldValues = function (fields) {
                var self = this;
                var entityName = this.ctx.entityName, recordId = this.ctx.recordId;
                if (!this.xrm || !entityName || !recordId) return Promise.resolve();
                var cols = {};
                fields.forEach(function (f) {
                    if (!f.hop && f.column && (!f.table || f.table === entityName)) cols[f.column] = true;
                });
                var list = Object.keys(cols);
                if (list.length === 0) return Promise.resolve();
                return this.xrm.WebApi.retrieveRecord(entityName, recordId, "?$select=" + list.join(",")).then(
                    function (rec) {
                        fields.forEach(function (f) {
                            if (f.hop || !f.column) return;
                            if (f.table && f.table !== entityName) return;
                            var fmt = rec[f.column + "@OData.Community.Display.V1.FormattedValue"];
                            var raw = rec[f.column];
                            var v = (fmt !== undefined && fmt !== null) ? fmt : raw;
                            if (v !== undefined && v !== null) f.value = String(v);
                        });
                    },
                    function () { return; }
                );
            };

            // ----------------------------- rendering -----------------------------
            Wizard.prototype.render = function () {
                var t = DICT[this.lang];
                this.root.setAttribute("dir", this.lang === "he" ? "rtl" : "ltr");
                document.documentElement.setAttribute("lang", this.lang);
                this.root.innerHTML = "";
                this.root.appendChild(this.buildHeader(t));
                this.root.appendChild(this.buildSubtitle(t));
                var body = el("div", { "class": "edo-wz-body" });
                body.appendChild(this.buildNav(t));
                body.appendChild(this.buildContent(t));
                this.root.appendChild(body);
                this.root.appendChild(this.buildFooter(t));
                if (this._toast) this.root.appendChild(this._toast);
            };

            Wizard.prototype.buildHeader = function (t) {
                var title = el("div", { "class": "edo-wz-title", text: t.title });
                var left = el("div", { "class": "edo-wz-head-left" });
                var logo = this.buildLogo();
                if (logo) left.appendChild(logo);
                left.appendChild(title);
                if (this.demo) left.appendChild(el("span", { "class": "edo-wz-demo", text: t.demoBadge }));
                // No close button here: the side pane already provides one, so a
                // second X inside the frame would be redundant.
                return el("div", { "class": "edo-wz-header" }, [left]);
            };

            // The easydo logo (an image web resource). Resolved against the client
            // URL so it works regardless of org/path. Returns null if unavailable.
            Wizard.prototype.buildLogo = function () {
                var base = "";
                try {
                    var X = this.xrm || getXrm();
                    if (X && X.Utility && X.Utility.getGlobalContext) {
                        base = X.Utility.getGlobalContext().getClientUrl() || "";
                    }
                } catch (e) { base = ""; }
                var img = el("img", { "class": "edo-wz-logo" });
                img.src = base + "/WebResources/alex_/images/easydoLogo.svg";
                img.alt = "easydo";
                img.onerror = function () { img.style.display = "none"; };
                return img;
            };

            Wizard.prototype.buildSubtitle = function (t) {
                return el("div", { "class": "edo-wz-subtitle", text: t.subtitle });
            };

            Wizard.prototype.buildNav = function (t) {
                var self = this;
                var keys = this.computeSteps();
                var nav = el("div", { "class": "edo-wz-nav" });
                for (var i = 0; i < keys.length; i++) {
                    var key = keys[i];
                    var done = i < this.step;
                    var active = i === this.step;
                    var dot = el("div", { "class": "edo-wz-dot" + (done ? " done" : "") + (active ? " active" : "") });
                    dot.appendChild(el("span", { text: done ? "\u2713" : String(i + 1) }));
                    var labels = el("div", { "class": "edo-wz-nav-labels" }, [
                        el("div", { "class": "edo-wz-nav-title", text: t.sTitle[key] }),
                        el("div", { "class": "edo-wz-nav-hint", text: t.sHint[key] })
                    ]);
                    var item = el("div", { "class": "edo-wz-nav-item" + (active ? " active" : "") }, [dot, labels]);
                    if (done) {
                        (function (idx) { item.onclick = function () { self.step = idx; self.render(); }; })(i);
                        item.classList.add("clickable");
                    }
                    nav.appendChild(item);
                }
                return nav;
            };

            Wizard.prototype.buildContent = function (t) {
                var content = el("div", { "class": "edo-wz-content" });
                var key = this.stepKeys[this.step] || "template";
                if (key === "template") content.appendChild(this.stepTemplate(t));
                else if (key === "recipients") content.appendChild(this.stepRecipients(t));
                else if (key === "data") content.appendChild(this.stepData(t));
                else if (key === "settings") content.appendChild(this.stepSettings(t));
                else if (key === "review") content.appendChild(this.stepReview(t));
                return content;
            };

            Wizard.prototype.heading = function (title, hint) {
                return el("div", { "class": "edo-wz-step-head" }, [
                    el("div", { "class": "edo-wz-step-title", text: title }),
                    el("div", { "class": "edo-wz-step-hint", text: hint })
                ]);
            };

            Wizard.prototype.stepTemplate = function (t) {
                var self = this;
                var wrap = el("div", { "class": "edo-wz-step" }, [this.heading(t.templateHeading, t.templateHint)]);
                if (this.templates.length === 0) {
                    wrap.appendChild(el("div", { "class": "edo-wz-empty", text: t.noTemplates }));
                    return wrap;
                }
                var list = el("div", { "class": "edo-wz-cards" });
                this.templates.forEach(function (tpl) {
                    var selected = tpl.id === self.selectedTemplateId;
                    var radio = el("div", { "class": "edo-wz-radio" + (selected ? " on" : "") });
                    var info = el("div", { "class": "edo-wz-card-info" }, [
                        el("div", { "class": "edo-wz-card-title", text: tpl.name }),
                        el("div", { "class": "edo-wz-card-sub", text: t.idLabel + tpl.externalId })
                    ]);
                    var card = el("div", { "class": "edo-wz-card" + (selected ? " sel" : "") }, [radio, info]);
                    card.onclick = function () {
                        if (self.selectedTemplateId === tpl.id) return;
                        self.selectedTemplateId = tpl.id;
                        self.syncRecipientsToTemplate(true);
                        self.loadFields();
                        self.render();
                    };
                    list.appendChild(card);
                });
                wrap.appendChild(list);
                return wrap;
            };

            Wizard.prototype.stepRecipients = function (t) {
                var self = this;
                var wrap = el("div", { "class": "edo-wz-step" }, [this.heading(t.recipientsHeading, this.roleMode ? t.roleHint : t.recipientsHintLocked)]);
                var list = el("div", { "class": "edo-wz-recips" });

                if (this.roleMode) {
                    // One fixed slot per signer role. The user only picks WHO fills
                    // each role (a contact); name + email fill in automatically.
                    this.recipients.forEach(function (r, idx) {
                        var roleLabel = el("div", { "class": "edo-wz-field-label", text: r.roleName });
                        var picker = el("div", { "class": "edo-wz-picker" });
                        self.renderRecipientPicker(picker, idx, t);
                        list.appendChild(el("div", { "class": "edo-wz-field" }, [roleLabel, picker]));
                    });
                    wrap.appendChild(list);
                    return wrap;
                }

                // Single-recipient mode: the recipient is resolved automatically from
                // the source record. It is READ-ONLY - the user only reviews and
                // approves; values cannot be edited and recipients cannot be
                // added/removed (the count is not user-defined here).
                if (this.recipients.length === 0) {
                    list.appendChild(el("div", { "class": "edo-wz-empty", text: t.noRecipients }));
                }
                this.recipients.forEach(function (r) {
                    var info = el("div", { "class": "edo-wz-chip-info" }, [
                        el("div", { "class": "edo-wz-chip-name", text: r.name || r.email || "\u2014" })
                    ]);
                    if (r.email) info.appendChild(el("div", { "class": "edo-wz-chip-mail", text: r.email }));
                    var badge = el("div", { "class": "edo-wz-ro-badge", text: t.recipientReadOnly });
                    list.appendChild(el("div", { "class": "edo-wz-chip locked" }, [info, badge]));
                });
                wrap.appendChild(list);
                return wrap;
            };

            // Renders the per-role contact picker into `container`. When a contact
            // is chosen its name + email are filled automatically, so the user only
            // chooses WHO fills the role. The search popup updates on its own without
            // re-rendering the whole wizard, which keeps the input focused.
            Wizard.prototype.renderRecipientPicker = function (container, idx, t) {
                var self = this;
                var r = this.recipients[idx];
                container.innerHTML = "";
                if (r.email || r.name) {
                    var info = el("div", { "class": "edo-wz-chip-info" }, [
                        el("div", { "class": "edo-wz-chip-name", text: r.name || r.email })
                    ]);
                    if (r.email) info.appendChild(el("div", { "class": "edo-wz-chip-mail", text: r.email }));
                    var change = el("button", { "class": "edo-wz-icon-btn", text: "\u2715" });
                    change.title = t.changeContact; change.setAttribute("aria-label", t.changeContact);
                    change.onclick = function () {
                        self.recipients[idx].name = ""; self.recipients[idx].email = ""; self.recipients[idx].contactId = "";
                        self.render();
                    };
                    container.appendChild(el("div", { "class": "edo-wz-chip" }, [info, change]));
                    return;
                }
                var input = el("input", { "class": "edo-wz-input", placeholder: t.searchContact });
                var pop = el("div", { "class": "edo-wz-pop" });
                var timer = null;
                input.oninput = function () {
                    if (timer) window.clearTimeout(timer);
                    var q = input.value;
                    timer = window.setTimeout(function () { self.searchContacts(q, pop, idx, t); }, 220);
                };
                input.onblur = function () { window.setTimeout(function () { pop.classList.remove("show"); }, 160); };
                input.onfocus = function () { if (pop.childNodes.length) pop.classList.add("show"); };
                container.appendChild(input);
                container.appendChild(pop);
            };

            // Live contact lookup for the role pickers (name or email match).
            Wizard.prototype.searchContacts = function (qstr, pop, idx, t) {
                var self = this;
                qstr = (qstr || "").trim();
                if (!this.xrm || qstr.length < 2) { pop.innerHTML = ""; pop.classList.remove("show"); return; }
                var safe = qstr.replace(/'/g, "''");
                var q = "?$select=contactid,fullname,emailaddress1,mobilephone,telephone1" +
                    "&$filter=(contains(fullname,'" + safe + "') or contains(emailaddress1,'" + safe + "')) and emailaddress1 ne null" +
                    "&$top=6";
                this.xrm.WebApi.retrieveMultipleRecords("contact", q).then(
                    function (res) {
                        var rows = (res && res.entities) || [];
                        pop.innerHTML = "";
                        if (rows.length === 0) {
                            pop.appendChild(el("div", { "class": "edo-wz-pop-empty", text: t.noContactMatch }));
                            pop.classList.add("show");
                            return;
                        }
                        rows.forEach(function (c) {
                            var item = el("div", { "class": "edo-wz-pop-item" }, [
                                el("div", { "class": "edo-wz-pop-name", text: c.fullname || c.emailaddress1 }),
                                el("div", { "class": "edo-wz-pop-mail", text: c.emailaddress1 || "" })
                            ]);
                            // mousedown (not click) so selection fires before input blur.
                            item.onmousedown = function (ev) {
                                ev.preventDefault();
                                self.recipients[idx].name = c.fullname || "";
                                self.recipients[idx].email = c.emailaddress1 || "";
                                self.recipients[idx].phone = c.mobilephone || c.telephone1 || "";
                                self.recipients[idx].contactId = c.contactid || "";
                                self.render();
                            };
                            pop.appendChild(item);
                        });
                        pop.classList.add("show");
                    },
                    function () { pop.innerHTML = ""; pop.classList.remove("show"); }
                );
            };

            Wizard.prototype.stepData = function (t) {
                var self = this;
                var tplH = this.findTemplate();
                var anyEditable = !!(tplH && tplH.allowPrefillEdit) && (this.fields || []).some(function (f) { return f.editable && !f.readOnly; });
                var hint = anyEditable ? t.dataHint : t.dataHintReadOnly;
                var wrap = el("div", { "class": "edo-wz-step" }, [this.heading(t.dataHeading, hint)]);
                if (this.fieldsLoading) {
                    wrap.appendChild(el("div", { "class": "edo-wz-empty", text: t.dataLoading }));
                    return wrap;
                }
                if (!this.fields || this.fields.length === 0) {
                    wrap.appendChild(el("div", { "class": "edo-wz-empty", text: t.dataEmpty }));
                    return wrap;
                }
                var tpl = this.findTemplate();
                var allowEdit = !!(tpl && tpl.allowPrefillEdit);
                this.fields.forEach(function (f, idx) {
                    var editable = allowEdit && f.editable && !f.readOnly;
                    var labelText = f.label + (editable ? "" : "  · " + t.fieldLocked);
                    var label = el("div", { "class": "edo-wz-field-label", text: labelText });
                    var input = el("input", { "class": "edo-wz-input", value: f.value });
                    if (!editable) { input.readOnly = true; input.style.background = "#f5f5fa"; input.style.color = "var(--edo-sub)"; }
                    else { input.oninput = function () { self.fields[idx].value = input.value; }; }
                    wrap.appendChild(el("div", { "class": "edo-wz-field" }, [label, input]));
                });
                return wrap;
            };

            Wizard.prototype.stepSettings = function (t) {
                var self = this;
                var wrap = el("div", { "class": "edo-wz-step" }, [this.heading(t.settingsHeading, t.settingsHint)]);
                var modeCards = el("div", { "class": "edo-wz-cards" });
                var mkMode = function (draft, title, desc) {
                    var sel = self.isDraft === draft;
                    var radio = el("div", { "class": "edo-wz-radio" + (sel ? " on" : "") });
                    var info = el("div", { "class": "edo-wz-card-info" }, [
                        el("div", { "class": "edo-wz-card-title", text: title }),
                        el("div", { "class": "edo-wz-card-sub", text: desc })
                    ]);
                    var card = el("div", { "class": "edo-wz-card" + (sel ? " sel" : "") }, [radio, info]);
                    card.onclick = function () { self.isDraft = draft; self.render(); };
                    return card;
                };
                modeCards.appendChild(mkMode(false, t.modeSend, t.modeSendDesc));
                modeCards.appendChild(mkMode(true, t.modeDraft, t.modeDraftDesc));
                wrap.appendChild(modeCards);

                var langLabel = el("div", { "class": "edo-wz-field-label", text: t.languageLabel });
                var seg = el("div", { "class": "edo-wz-seg" });
                var mkSeg = function (l, label) {
                    var b = el("button", { "class": "edo-wz-seg-btn" + (self.docLang === l ? " on" : ""), text: label });
                    b.onclick = function () { self.docLang = l; self.render(); };
                    return b;
                };
                seg.appendChild(mkSeg("he", t.langHe));
                seg.appendChild(mkSeg("en", t.langEn));
                wrap.appendChild(el("div", { "class": "edo-wz-field" }, [langLabel, seg]));

                // Notification channels. Shown only when the org enabled multi-channel
                // sending; otherwise the document is sent by email only (easydo default).
                var s = this.settings;
                if (s.multiChannel) {
                    var chLabel = el("div", { "class": "edo-wz-field-label", text: t.channelsLabel });
                    var chList = el("div", { "class": "edo-wz-channels" });
                    var mkChannel = function (key, label, allowed) {
                        if (!allowed) return;
                        var on = !!self.channels[key];
                        var box = el("div", { "class": "edo-wz-chk" + (on ? " on" : "") }, [
                            el("div", { "class": "edo-wz-chk-box" }),
                            el("div", { "class": "edo-wz-chk-label", text: label })
                        ]);
                        box.onclick = function () { self.channels[key] = !self.channels[key]; self.render(); };
                        chList.appendChild(box);
                    };
                    mkChannel("email", t.channelEmail, s.allowEmail);
                    mkChannel("sms", t.channelSms, s.allowSms);
                    mkChannel("whatsapp", t.channelWhatsApp, s.allowWhatsApp);
                    var field = el("div", { "class": "edo-wz-field" }, [chLabel, chList]);
                    field.appendChild(el("div", { "class": "edo-wz-step-hint", text: t.channelsHint }));
                    wrap.appendChild(field);
                }
                return wrap;
            };

            Wizard.prototype.stepReview = function (t) {
                var wrap = el("div", { "class": "edo-wz-step" }, [this.heading(t.reviewHeading, t.reviewHint)]);
                var tpl = this.findTemplate();
                var valid = this.recipients.filter(function (r) { return isEmail(r.email); });
                var rows = [];
                var addRow = function (label, value) {
                    rows.push(el("div", { "class": "edo-wz-rev-row" }, [
                        el("div", { "class": "edo-wz-rev-label", text: label }),
                        el("div", { "class": "edo-wz-rev-value", text: value })
                    ]));
                };
                addRow(t.reviewTemplate, tpl ? tpl.name : "-");
                if (this.roleMode) {
                    this.recipients.forEach(function (r) {
                        addRow(r.roleName, isEmail(r.email) ? (r.name ? (r.name + " <" + r.email + ">") : r.email) : "-");
                    });
                } else {
                    addRow(t.reviewRecipients, valid.map(function (r) { return r.name ? (r.name + " <" + r.email + ">") : r.email; }).join(", ") || "-");
                }
                addRow(t.reviewMode, this.isDraft ? t.modeDraft : t.modeSend);
                if (this.settings.multiChannel) {
                    var picked = [];
                    if (this.channels.email && this.settings.allowEmail) picked.push(t.channelEmail);
                    if (this.channels.sms && this.settings.allowSms) picked.push(t.channelSms);
                    if (this.channels.whatsapp && this.settings.allowWhatsApp) picked.push(t.channelWhatsApp);
                    addRow(t.reviewChannels, picked.join(", ") || t.channelEmail);
                }
                var editedFields = this.editedFields();
                if (editedFields.length > 0) {
                    addRow(t.reviewFields, editedFields.map(function (f) { return f.label; }).join(", "));
                }
                if (this.ctx.recordName || this.ctx.entityName) {
                    addRow(t.reviewContext, this.ctx.recordName || this.ctx.entityName);
                }
                wrap.appendChild(el("div", { "class": "edo-wz-review" }, rows));
                return wrap;
            };

            Wizard.prototype.buildFooter = function (t) {
                var self = this;
                var cancel = el("button", { "class": "edo-wz-btn ghost", text: t.cancel });
                cancel.onclick = function () { self.closePane(); };
                var nav = el("div", { "class": "edo-wz-foot-nav" });
                if (this.step > 0) {
                    var back = el("button", { "class": "edo-wz-btn", text: t.back });
                    back.onclick = function () { self.step--; self.render(); };
                    nav.appendChild(back);
                }
                var err = this.stepError(t);
                if (this.step < this.stepKeys.length - 1) {
                    var next = el("button", { "class": "edo-wz-btn primary", text: t.next });
                    next.onclick = function () { if (!self.stepError(t)) { self.step++; self.render(); } };
                    if (err) next.classList.add("disabled");
                    nav.appendChild(next);
                } else {
                    var send = el("button", { "class": "edo-wz-btn primary", text: this.submitted ? t.sending : t.send });
                    send.onclick = function () { if (!self.stepError(t) && !self.submitted) self.submit(); };
                    if (err || this.submitted) send.classList.add("disabled");
                    nav.appendChild(send);
                }
                var errEl = err ? el("div", { "class": "edo-wz-err", text: err }) : el("div");
                return el("div", { "class": "edo-wz-footer" }, [
                    el("div", { "class": "edo-wz-foot-start" }, [cancel, errEl]),
                    nav
                ]);
            };

            Wizard.prototype.stepError = function (t) {
                var key = this.stepKeys[this.step] || "template";
                if (key === "template") { if (!this.selectedTemplateId) return t.pickTemplate; }
                if (key === "recipients" || key === "review") {
                    if (key === "review" && !this.selectedTemplateId) return t.pickTemplate;
                    if (this.roleMode) {
                        var allFilled = this.recipients.every(function (r) { return isEmail(r.email); });
                        if (!allFilled) return t.needRecipient;
                    } else if (this.recipients.filter(function (r) { return isEmail(r.email); }).length === 0) {
                        return t.needRecipient;
                    }
                }
                return "";
            };

            // Fields the user actually changed from their resolved/original value.
            Wizard.prototype.editedFields = function () {
                if (!this.fields) return [];
                var tpl = this.findTemplate();
                if (!tpl || !tpl.allowPrefillEdit) return [];
                return this.fields.filter(function (f) {
                    return f.editable && !f.readOnly && String(f.value) !== String(f.original === undefined ? f.value : f.original);
                });
            };

            Wizard.prototype.findTemplate = function () {
                var id = this.selectedTemplateId;
                return this.templates.filter(function (x) { return x.id === id; })[0];
            };

            // ----------------------------- submit / close -----------------------------
            Wizard.prototype.buildPayload = function () {
                var self = this;
                var tpl = this.findTemplate();
                // In role mode keep the role's sequence; otherwise number sequentially.
                var recipients = this.recipients
                    .filter(function (r) { return isEmail(r.email); })
                    .map(function (r, i) {
                        return {
                            name: r.name,
                            email: r.email,
                            phone: r.phone || "",
                            sequence: self.roleMode && r.sequence ? r.sequence : i + 1,
                            roleName: r.roleName || "",
                            contactId: r.contactId || ""
                        };
                    });
                // Edited prefill values become Prefill overrides on the request.
                var fieldValues = this.editedFields().map(function (f) {
                    return { name: f.externalId, value: f.value, label: f.label, readOnly: !!f.readOnly };
                });
                var relatedContactId = this.ctx.entityName === "contact" ? this.ctx.recordId : "";
                // Notification channels: when multi-channel is off the document is sent
                // by email only (easydo default). Otherwise honour the picked channels.
                var channels = this.settings.multiChannel
                    ? { email: !!this.channels.email, sms: !!this.channels.sms, whatsapp: !!this.channels.whatsapp }
                    : { email: true, sms: false, whatsapp: false };
                return {
                    templateId: this.demo ? "" : (tpl ? tpl.id : ""),
                    templateExternalId: tpl ? tpl.externalId : "",
                    isDraft: this.isDraft,
                    language: this.docLang,
                    recipients: recipients,
                    fieldValues: fieldValues,
                    notifyEmails: recipients.map(function (r) { return { name: r.name, email: r.email }; }),
                    channels: channels,
                    launchEntityName: this.ctx.entityName,
                    launchRecordId: this.ctx.recordId,
                    relatedContactId: relatedContactId
                };
            };

            Wizard.prototype.submit = function () {
                var self = this;
                var t = DICT[this.lang];
                this.submitted = true;
                this.render();
                if (!this.xrm) {
                    this.submitted = false;
                    this.toast(false, t.sentErr + "Xrm");
                    this.render();
                    return;
                }
                var output = JSON.stringify({ action: "submit", nonce: Date.now(), payload: this.buildPayload() });
                this.xrm.WebApi.createRecord("alex_signaturerequest", { alex_wizardpayload: output }).then(
                    function () {
                        self.toast(true, t.sentOk);
                        window.setTimeout(function () { self.closePane(); }, 1100);
                    },
                    function (err) {
                        self.submitted = false;
                        self.toast(false, t.sentErr + (err && err.message ? err.message : ""));
                        self.render();
                    }
                );
            };

            Wizard.prototype.toast = function (ok, msg) {
                this._toast = el("div", { "class": "edo-wz-toast " + (ok ? "ok" : "bad") + " show", text: msg });
                if (this.root && !this.submitted) this.render();
                else if (this.root) this.root.appendChild(this._toast);
            };

            Wizard.prototype.closePane = function () {
                try {
                    var X = this.xrm || getXrm();
                    if (X && X.App && X.App.sidePanes) {
                        var pane = this.ctx.paneId ? X.App.sidePanes.getPane(this.ctx.paneId) : X.App.sidePanes.getSelectedPane();
                        if (pane) { pane.close(); return; }
                    }
                } catch (e) { }
            };

            function boot() {
                var root = document.getElementById("edo-root");
                var wz = new Wizard(root);
                window.__edoWizard = wz;
                wz.start();
            }

            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", boot);
            } else {
                boot();
            }
        })();
    </script>
</body>
</html>
