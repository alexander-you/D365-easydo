<!DOCTYPE html>
<!--
  easydo - Send Wizard (HTML web resource, hosted in a model-driven SIDE PANE)

  Opened by EasyDo.FormSend.launch via Xrm.App.sidePanes.createPane(...).navigate(
  { pageType:"webresource", webresourceName:"alex_/html/sendWizard.html",
    data:"entityName=..&recordId=..&recordName=..&uilang=..&paneId=.." }).

  Because the web resource is served from the ORG domain it is SAME-ORIGIN with
  the app, so it has native Xrm.WebApi (no premium connector, unlike a canvas
  custom page). It reads the active signature templates itself, runs the 4-step
  wizard, and on submit creates ONE alex_signaturerequest row with the wizard
  JSON in alex_wizardpayload. The server-side WizardIntakePlugin turns that JSON
  into the real request (template lookup, recipients, Ready-to-Send), exactly as
  before. Fully bilingual EN/HE with RTL.
-->

                    "&$filter=_alex_templateid_value eq " + tpl.id +
                    " and alex_isvisibletouser eq true" +
                    " and (alex_direction eq 626210000 or alex_direction eq 626210002)";
                this.xrm.WebApi.retrieveMultipleRecords("alex_templatefieldmapping", q).then(
                    function (res) {
                        var rows = (res && res.entities) || [];
                        var fields = rows.filter(function (r) { return r.alex_externalfieldid; }).map(function (r) {
                            return {
                                externalId: r.alex_externalfieldid,
                                label: r.alex_externalfieldname || r.alex_externalfieldid,
                                table: r.alex_dynamicstable || "",
                                column: r.alex_dynamicsfield || "",
                                hop: r.alex_lookupfield || "",
                                editable: r.alex_iseditablebeforesend === true,
                                readOnly: r.alex_isreadonly === true,
                                value: r.alex_defaultvalue || ""
                            };
                        });
                        self.resolveFieldValues(fields).then(function () {
                            if (loadingFor !== self.selectedTemplateId) return;
                            fields.forEach(function (f) { f.original = f.value; });
                            self.fields = fields;
                            self.fieldsLoadedFor = loadingFor;
                            self.fieldsLoading = false;
                            self.render();
                        });
                    },
                    function () {
                        self.fieldsLoadedFor = loadingFor;
                        self.fieldsLoading = false;
                        self.render();
                    }
                );
            };

            // Best-effort read of each field's value from the launch record. Direct
            // columns (on the launch entity) resolve via one retrieve; lookup-hop
            // fields are left to the server-side resolver and shown empty/editable.
            Wizard.prototype.resolveFieldValues = function (fields) {
                var self = this;
                var entityName = this.ctx.entityName, recordId = this.ctx.recordId;
                if (!this.xrm || !entityName || !recordId) return Promise.resolve();
                var cols = {};
                fields.forEach(function (f) {
                    if (!f.hop && f.column && (!f.table || f.table === entityName)) cols[f.column] = true;
                });
                var list = Object.keys(cols);
                if (list.length === 0) return Promise.resolve();
                return this.xrm.WebApi.retrieveRecord(entityName, recordId, "?$select=" + list.join(",")).then(
                    function (rec) {
                        fields.forEach(function (f) {
                            if (f.hop || !f.column) return;
                            if (f.table && f.table !== entityName) return;
                            var fmt = rec[f.column + "@OData.Community.Display.V1.FormattedValue"];
                            var raw = rec[f.column];
                            var v = (fmt !== undefined && fmt !== null) ? fmt : raw;
                            if (v !== undefined && v !== null) f.value = String(v);
                        });
                    },
                    function () { return; }
                );
            };

            // ----------------------------- rendering -----------------------------
            Wizard.prototype.render = function () {
                var t = DICT[this.lang];
                this.root.setAttribute("dir", this.lang === "he" ? "rtl" : "ltr");
                document.documentElement.setAttribute("lang", this.lang);
                this.root.innerHTML = "";
                this.root.appendChild(this.buildHeader(t));
                this.root.appendChild(this.buildSubtitle(t));
                // Document preview takes over the body once requested.
                if (this.previewState) {
                    this.root.appendChild(this.buildPreview(t));
                    if (this._toast) this.root.appendChild(this._toast);
                    return;
                }
                var body = el("div", { "class": "edo-wz-body" });
                body.appendChild(this.buildNav(t));
                body.appendChild(this.buildContent(t));
                this.root.appendChild(body);
                this.root.appendChild(this.buildFooter(t));
                if (this._toast) this.root.appendChild(this._toast);
            };

            Wizard.prototype.buildHeader = function (t) {
                var title = el("div", { "class": "edo-wz-title", text: t.title });
                var left = el("div", { "class": "edo-wz-head-left" });
                var logo = this.buildLogo();
                if (logo) left.appendChild(logo);
                left.appendChild(title);
                if (this.demo) left.appendChild(el("span", { "class": "edo-wz-demo", text: t.demoBadge }));
                // No close button here: the side pane already provides one, so a
                // second X inside the frame would be redundant.
                return el("div", { "class": "edo-wz-header" }, [left]);
            };

            // The easydo logo (an image web resource). Resolved against the client
            // URL so it works regardless of org/path. Returns null if unavailable.
            Wizard.prototype.buildLogo = function () {
                var base = "";
                try {
                    var X = this.xrm || getXrm();
                    if (X && X.Utility && X.Utility.getGlobalContext) {
                        base = X.Utility.getGlobalContext().getClientUrl() || "";
                    }
                } catch (e) { base = ""; }
                var img = el("img", { "class": "edo-wz-logo" });
                img.src = base + "/WebResources/alex_/images/easydoLogo.svg";
                img.alt = "easydo";
                img.onerror = function () { img.style.display = "none"; };
                return img;
            };

            Wizard.prototype.buildSubtitle = function (t) {
                return el("div", { "class": "edo-wz-subtitle", text: t.subtitle });
            };

            Wizard.prototype.buildNav = function (t) {
                var self = this;
                var keys = this.computeSteps();
                var nav = el("div", { "class": "edo-wz-nav" });
                for (var i = 0; i < keys.length; i++) {
                    var key = keys[i];
                    var done = i < this.step;
                    var active = i === this.step;
                    var dot = el("div", { "class": "edo-wz-dot" + (done ? " done" : "") + (active ? " active" : "") });
                    dot.appendChild(el("span", { text: done ? "\u2713" : String(i + 1) }));
                    var labels = el("div", { "class": "edo-wz-nav-labels" }, [
                        el("div", { "class": "edo-wz-nav-title", text: t.sTitle[key] }),
                        el("div", { "class": "edo-wz-nav-hint", text: t.sHint[key] })
                    ]);
                    var item = el("div", { "class": "edo-wz-nav-item" + (active ? " active" : "") }, [dot, labels]);
                    if (done) {
                        (function (idx) { item.onclick = function () { self.step = idx; self.render(); }; })(i);
                        item.classList.add("clickable");
                    }
                    nav.appendChild(item);
                }
                return nav;
            };

            Wizard.prototype.buildContent = function (t) {
                var content = el("div", { "class": "edo-wz-content" });
                var key = this.stepKeys[this.step] || "template";
                if (key === "template") content.appendChild(this.stepTemplate(t));
                else if (key === "recipients") content.appendChild(this.stepRecipients(t));
                else if (key === "data") content.appendChild(this.stepData(t));
                else if (key === "settings") content.appendChild(this.stepSettings(t));
                else if (key === "review") content.appendChild(this.stepReview(t));
                return content;
            };

            Wizard.prototype.heading = function (title, hint) {
                return el("div", { "class": "edo-wz-step-head" }, [
                    el("div", { "class": "edo-wz-step-title", text: title }),
                    el("div", { "class": "edo-wz-step-hint", text: hint })
                ]);
            };

            Wizard.prototype.stepTemplate = function (t) {
                var self = this;
                var wrap = el("div", { "class": "edo-wz-step" }, [this.heading(t.templateHeading, t.templateHint)]);
                if (this.templates.length === 0) {
                    wrap.appendChild(el("div", { "class": "edo-wz-empty", text: t.noTemplates }));
                    return wrap;
                }
                var list = el("div", { "class": "edo-wz-cards" });
                this.templates.forEach(function (tpl) {
                    var selected = tpl.id === self.selectedTemplateId;
                    var radio = el("div", { "class": "edo-wz-radio" + (selected ? " on" : "") });
                    var info = el("div", { "class": "edo-wz-card-info" }, [
                        el("div", { "class": "edo-wz-card-title", text: tpl.name }),
                        el("div", { "class": "edo-wz-card-sub", text: t.idLabel + tpl.externalId })
                    ]);
                    var card = el("div", { "class": "edo-wz-card" + (selected ? " sel" : "") }, [radio, info]);
                    card.onclick = function () {
                        if (self.selectedTemplateId === tpl.id) return;
                        self.selectedTemplateId = tpl.id;
                        self.syncRecipientsToTemplate(true);
                        self.loadFields();
                        self.render();
                    };
                    list.appendChild(card);
                });
                wrap.appendChild(list);
                return wrap;
            };

            Wizard.prototype.stepRecipients = function (t) {
                var self = this;
                var wrap = el("div", { "class": "edo-wz-step" }, [this.heading(t.recipientsHeading, this.roleMode ? t.roleHint : t.recipientsHintLocked)]);
                var list = el("div", { "class": "edo-wz-recips" });

                if (this.roleMode) {
                    // One fixed slot per signer role. The user only picks WHO fills
                    // each role (a contact); name + email fill in automatically.
                    this.recipients.forEach(function (r, idx) {
                        var roleLabel = el("div", { "class": "edo-wz-field-label", text: r.roleName });
                        var picker = el("div", { "class": "edo-wz-picker" });
                        self.renderRecipientPicker(picker, idx, t);
                        list.appendChild(el("div", { "class": "edo-wz-field" }, [roleLabel, picker]));
                    });
                    wrap.appendChild(list);
                    return wrap;
                }

                // Single-recipient mode: the recipient is resolved automatically from
                // the source record. It is READ-ONLY - the user only reviews and
                // approves; values cannot be edited and recipients cannot be
                // added/removed (the count is not user-defined here).
                if (this.recipients.length === 0) {
                    list.appendChild(el("div", { "class": "edo-wz-empty", text: t.noRecipients }));
                }
                this.recipients.forEach(function (r) {
                    var contact = r.email || r.phone || "";
                    var info = el("div", { "class": "edo-wz-chip-info" }, [
                        el("div", { "class": "edo-wz-chip-name", text: r.name || contact || "\u2014" })
                    ]);
                    if (contact) info.appendChild(el("div", { "class": "edo-wz-chip-mail", text: contact }));
                    var badge = el("div", { "class": "edo-wz-ro-badge", text: t.recipientReadOnly });
                    list.appendChild(el("div", { "class": "edo-wz-chip locked" }, [info, badge]));
                });
                wrap.appendChild(list);
                return wrap;
            };

            // Renders the per-role contact picker into `container`. When a contact
            // is chosen its name + email are filled automatically, so the user only
            // chooses WHO fills the role. The search popup updates on its own without
            // re-rendering the whole wizard, which keeps the input focused.
            Wizard.prototype.renderRecipientPicker = function (container, idx, t) {
                var self = this;
                var r = this.recipients[idx];
                container.innerHTML = "";
                var contact = r.email || r.phone || "";
                if (contact || r.name) {
                    var info = el("div", { "class": "edo-wz-chip-info" }, [
                        el("div", { "class": "edo-wz-chip-name", text: r.name || contact })
                    ]);
                    if (contact) info.appendChild(el("div", { "class": "edo-wz-chip-mail", text: contact }));
                    var change = el("button", { "class": "edo-wz-icon-btn", text: "\u2715" });
                    change.title = t.changeContact; change.setAttribute("aria-label", t.changeContact);
                    change.onclick = function () {
                        self.recipients[idx].name = ""; self.recipients[idx].email = ""; self.recipients[idx].phone = ""; self.recipients[idx].contactId = "";
                        self.render();
                    };
                    container.appendChild(el("div", { "class": "edo-wz-chip" }, [info, change]));
                    return;
                }
                var input = el("input", { "class": "edo-wz-input", placeholder: t.searchContact });
                var pop = el("div", { "class": "edo-wz-pop" });
                var timer = null;
                input.oninput = function () {
                    if (timer) window.clearTimeout(timer);
                    var q = input.value;
                    timer = window.setTimeout(function () { self.searchContacts(q, pop, idx, t); }, 220);
                };
                input.onblur = function () { window.setTimeout(function () { pop.classList.remove("show"); }, 160); };
                input.onfocus = function () { if (pop.childNodes.length) pop.classList.add("show"); };
                container.appendChild(input);
                container.appendChild(pop);
            };

            // Live contact lookup for the role pickers (name or email match).
            Wizard.prototype.searchContacts = function (qstr, pop, idx, t) {
                var self = this;
                qstr = (qstr || "").trim();
                if (!this.xrm || qstr.length < 2) { pop.innerHTML = ""; pop.classList.remove("show"); return; }
                var safe = qstr.replace(/'/g, "''");
                var match = "(contains(fullname,'" + safe + "') or contains(emailaddress1,'" + safe + "') or contains(mobilephone,'" + safe + "'))";
                // When the primary channel is email a recipient must have one; for
                // SMS / WhatsApp a phone number is enough, so don't force an email.
                var filter = this.primaryNeedsEmail() ? (match + " and emailaddress1 ne null") : match;
                var q = "?$select=contactid,fullname,emailaddress1,mobilephone,telephone1" +
                    "&$filter=" + filter +
                    "&$top=6";
                this.xrm.WebApi.retrieveMultipleRecords("contact", q).then(
                    function (res) {
                        var rows = (res && res.entities) || [];
                        pop.innerHTML = "";
                        if (rows.length === 0) {
                            pop.appendChild(el("div", { "class": "edo-wz-pop-empty", text: t.noContactMatch }));
                            pop.classList.add("show");
                            return;
                        }
                        rows.forEach(function (c) {
                            var cphone = c.mobilephone || c.telephone1 || "";
                            var item = el("div", { "class": "edo-wz-pop-item" }, [
                                el("div", { "class": "edo-wz-pop-name", text: c.fullname || c.emailaddress1 || cphone }),
                                el("div", { "class": "edo-wz-pop-mail", text: c.emailaddress1 || cphone || "" })
                            ]);
                            // mousedown (not click) so selection fires before input blur.
                            item.onmousedown = function (ev) {
                                ev.preventDefault();
                                self.recipients[idx].name = c.fullname || "";
                                self.recipients[idx].email = c.emailaddress1 || "";
                                self.recipients[idx].phone = cphone;
                                self.recipients[idx].contactId = c.contactid || "";
                                self.render();
                            };
                            pop.appendChild(item);
                        });
                        pop.classList.add("show");
                    },
                    function () { pop.innerHTML = ""; pop.classList.remove("show"); }
                );
            };

            Wizard.prototype.stepData = function (t) {
                var self = this;
                var tplH = this.findTemplate();
                var anyEditable = !!(tplH && tplH.allowPrefillEdit) && (this.fields || []).some(function (f) { return f.editable && !f.readOnly; });
                var hint = anyEditable ? t.dataHint : t.dataHintReadOnly;
                var wrap = el("div", { "class": "edo-wz-step" }, [this.heading(t.dataHeading, hint)]);
                if (this.fieldsLoading) {
                    wrap.appendChild(el("div", { "class": "edo-wz-empty", text: t.dataLoading }));
                    return wrap;
                }
                if (!this.fields || this.fields.length === 0) {
                    wrap.appendChild(el("div", { "class": "edo-wz-empty", text: t.dataEmpty }));
                    return wrap;
                }
                var tpl = this.findTemplate();
                var allowEdit = !!(tpl && tpl.allowPrefillEdit);
                this.fields.forEach(function (f, idx) {
                    var editable = allowEdit && f.editable && !f.readOnly;
                    var labelText = f.label + (editable ? "" : "  · " + t.fieldLocked);
                    var label = el("div", { "class": "edo-wz-field-label", text: labelText });
                    var input = el("input", { "class": "edo-wz-input", value: f.value });
                    if (!editable) { input.readOnly = true; input.style.background = "#f5f5fa"; input.style.color = "var(--edo-sub)"; }
                    else { input.oninput = function () { self.fields[idx].value = input.value; }; }
                    wrap.appendChild(el("div", { "class": "edo-wz-field" }, [label, input]));
                });
                return wrap;
            };

            Wizard.prototype.stepSettings = function (t) {
                var self = this;
                var cc = this.isCcSend();
                var wrap = el("div", { "class": "edo-wz-step" }, [this.heading(t.settingsHeading, t.settingsHint)]);

                // Contact Center: the document is sent over the live conversation, so
                // explain that the link is generated and delivered automatically.
                if (cc) {
                    wrap.appendChild(el("div", { "class": "edo-wz-cc-banner" }, [
                        el("div", { "class": "edo-wz-cc-banner-icon", text: "\uD83D\uDCAC" }),
                        el("div", { "class": "edo-wz-cc-banner-text", text: t.ccBanner })
                    ]));
                }

                // Send-mode cards (direct vs preview). The preview option is hidden for
                // Contact Center sends — a live conversation always sends directly.
                if (cc) {
                    this.isDraft = false;
                } else {
                    var modeCards = el("div", { "class": "edo-wz-cards" });
                    var mkMode = function (draft, title, desc) {
                        var sel = self.isDraft === draft;
                        var radio = el("div", { "class": "edo-wz-radio" + (sel ? " on" : "") });
                        var info = el("div", { "class": "edo-wz-card-info" }, [
                            el("div", { "class": "edo-wz-card-title", text: title }),
                            el("div", { "class": "edo-wz-card-sub", text: desc })
                        ]);
                        var card = el("div", { "class": "edo-wz-card" + (sel ? " sel" : "") }, [radio, info]);
                        card.onclick = function () { self.isDraft = draft; self.render(); };
                        return card;
                    };
                    modeCards.appendChild(mkMode(false, t.modeSend, t.modeSendDesc));
                    // The preview option is only offered when the org enabled it.
                    if (this.settings && this.settings.allowPreview) {
                        modeCards.appendChild(mkMode(true, t.modeDraft, t.modeDraftDesc));
                    }
                    wrap.appendChild(modeCards);
                }

                var s = this.settings;
                var chLabels = { email: t.channelEmail, sms: t.channelSms, whatsapp: t.channelWhatsApp };
                var chLabel = el("div", { "class": "edo-wz-field-label", text: t.channelsLabel });
                var chList = el("div", { "class": "edo-wz-channels" });

                if (cc) {
                    // The live conversation is the primary channel — locked "on".
                    var liveBox = el("div", { "class": "edo-wz-chk on locked" }, [
                        el("div", { "class": "edo-wz-chk-box" }),
                        el("div", { "class": "edo-wz-chk-label", text: t.ccLiveChannel + " \u00B7 " + t.ccLivePrimary })
                    ]);
                    chList.appendChild(liveBox);
                    // easydo channels are OPTIONAL backups here (none required).
                    CHANNELS.forEach(function (key) {
                        if (!s.allow || !s.allow[key]) return;
                        var on = !!self.channels[key];
                        var box = el("div", { "class": "edo-wz-chk" + (on ? " on" : "") }, [
                            el("div", { "class": "edo-wz-chk-box" }),
                            el("div", { "class": "edo-wz-chk-label", text: chLabels[key] })
                        ]);
                        box.onclick = function () { self.channels[key] = !self.channels[key]; self.render(); };
                        chList.appendChild(box);
                    });
                    wrap.appendChild(el("div", { "class": "edo-wz-field" }, [chLabel, chList,
                        el("div", { text: t.ccBackupHint, style: "margin:8px 2px 0; font-size:12px; line-height:1.5; color: var(--edo-sub);" })
                    ]));
                    return wrap;
                }

                // Standard send: PRIMARY easydo channel (locked) + optional additional
                // channels (when enabled and complete).
                var primBox = el("div", { "class": "edo-wz-chk on locked" }, [
                    el("div", { "class": "edo-wz-chk-box" }),
                    el("div", { "class": "edo-wz-chk-label", text: chLabels[s.primaryChannel] + " \u00B7 " + t.channelPrimary })
                ]);
                chList.appendChild(primBox);
                if (s.multiChannel) {
                    CHANNELS.forEach(function (key) {
                        if (key === s.primaryChannel) return;
                        if (!s.allow[key] || !self.channelComplete(key)) return;
                        var on = !!self.channels[key];
                        var box = el("div", { "class": "edo-wz-chk" + (on ? " on" : "") }, [
                            el("div", { "class": "edo-wz-chk-box" }),
                            el("div", { "class": "edo-wz-chk-label", text: chLabels[key] })
                        ]);
                        box.onclick = function () { self.channels[key] = !self.channels[key]; self.render(); };
                        chList.appendChild(box);
                    });
                }
                var field = el("div", { "class": "edo-wz-field" }, [chLabel, chList]);
                wrap.appendChild(field);
                return wrap;
            };

            Wizard.prototype.stepReview = function (t) {
                var self = this;
                var wrap = el("div", { "class": "edo-wz-step" }, [this.heading(t.reviewHeading, t.reviewHint)]);
                var tpl = this.findTemplate();
                var valid = this.recipients.filter(function (r) { return self.recipientReady(r); });
                var rows = [];
                var addRow = function (label, value) {
                    rows.push(el("div", { "class": "edo-wz-rev-row" }, [
                        el("div", { "class": "edo-wz-rev-label", text: label }),
                        el("div", { "class": "edo-wz-rev-value", text: value })
                    ]));
                };
                addRow(t.reviewTemplate, tpl ? tpl.name : "-");
                if (this.roleMode) {
                    this.recipients.forEach(function (r) {
                        addRow(r.roleName, self.recipientReady(r) ? self.recipientLabel(r) : "-");
                    });
                } else {
                    addRow(t.reviewRecipients, valid.map(function (r) { return self.recipientLabel(r); }).join(", ") || "-");
                }
                addRow(t.reviewMode, this.isCcSend() ? t.ccModeNote : (this.isDraft ? t.modeDraft : t.modeSend));
                // Channels: for a live conversation the primary is the live chat; for a
                // standard send it is the org easydo channel. Selected backups follow.
                var chLabels = { email: t.channelEmail, sms: t.channelSms, whatsapp: t.channelWhatsApp };
                var picked;
                if (this.isCcSend()) {
                    picked = [t.ccLiveChannel + " (" + t.ccLivePrimary + ")"];
                    CHANNELS.forEach(function (ch) {
                        if (self.channels[ch] && self.settings.allow && self.settings.allow[ch]) {
                            picked.push(chLabels[ch]);
                        }
                    });
                } else {
                    picked = [chLabels[this.settings.primaryChannel] + " (" + t.channelPrimary + ")"];
                    if (this.settings.multiChannel) {
                        CHANNELS.forEach(function (ch) {
                            if (ch === self.settings.primaryChannel) return;
                            if (self.channels[ch] && self.settings.allow[ch] && self.channelComplete(ch)) {
                                picked.push(chLabels[ch]);
                            }
                        });
                    }
                }
                addRow(t.reviewChannels, picked.join(", "));
                var editedFields = this.editedFields();
                if (editedFields.length > 0) {
                    addRow(t.reviewFields, editedFields.map(function (f) { return f.label; }).join(", "));
                }
                if (this.ctx.recordName || this.ctx.entityName) {
                    addRow(t.reviewContext, this.ctx.recordName || this.ctx.entityName);
                }
                wrap.appendChild(el("div", { "class": "edo-wz-review" }, rows));
                // Real-time mode (per-send), only when the org enabled it and this is
                // a direct send (not a preview draft). Hidden for Contact Center sends,
                // where the live conversation already provides the real-time channel.
                if (this.settings && this.settings.realtimeEnabled && !this.isDraft && !this.isCcSend()) {
                    var on = !!this.isRealtime;
                    var box = el("div", { "class": "edo-wz-chk" + (on ? " on" : "") }, [
                        el("div", { "class": "edo-wz-chk-box" }),
                        el("div", { "class": "edo-wz-chk-label", text: t.realtimeLabel })
                    ]);
                    box.onclick = function () { self.isRealtime = !self.isRealtime; self.render(); };
                    box.style.marginTop = "14px";
                    wrap.appendChild(box);
                    wrap.appendChild(el("div", { text: t.realtimeDesc, style: "margin:6px 2px 0; font-size:12px; line-height:1.5; color: var(--edo-sub);" }));
                }
                return wrap;
            };


            Wizard.prototype.buildFooter = function (t) {
                var self = this;
                var cancel = el("button", { "class": "edo-wz-btn ghost", text: t.cancel });
                cancel.onclick = function () { self.closePane(); };
                var nav = el("div", { "class": "edo-wz-foot-nav" });
                if (this.step > 0) {
                    var back = el("button", { "class": "edo-wz-btn", text: t.back });
                    back.onclick = function () { self.step--; self.render(); };
                    nav.appendChild(back);
                }
                var err = this.stepError(t);
                if (this.step < this.stepKeys.length - 1) {
                    var next = el("button", { "class": "edo-wz-btn primary", text: t.next });
                    next.onclick = function () { if (!self.stepError(t)) { self.step++; self.render(); } };
                    if (err) next.classList.add("disabled");
                    nav.appendChild(next);
                } else {
                    var send = el("button", { "class": "edo-wz-btn primary", text: this.submitted ? t.sending : t.send });
                    send.onclick = function () { if (!self.stepError(t) && !self.submitted) self.submit(); };
                    if (err || this.submitted) send.classList.add("disabled");
                    nav.appendChild(send);
                }
                var errEl = err ? el("div", { "class": "edo-wz-err", text: err }) : el("div");
                return el("div", { "class": "edo-wz-footer" }, [
                    el("div", { "class": "edo-wz-foot-start" }, [cancel, errEl]),
                    nav
                ]);
            };

            Wizard.prototype.stepError = function (t) {
                var self = this;
                var key = this.stepKeys[this.step] || "template";
                if (key === "template") { if (!this.selectedTemplateId) return t.pickTemplate; }
                if (key === "recipients" || key === "review") {
                    if (key === "review" && !this.selectedTemplateId) return t.pickTemplate;
                    var needMsg = this.primaryNeedsEmail() ? t.needRecipient : t.needRecipientPhone;
                    if (this.roleMode) {
                        var allFilled = this.recipients.every(function (r) { return self.recipientReady(r); });
                        if (!allFilled) return needMsg;
                    } else if (this.recipients.filter(function (r) { return self.recipientReady(r); }).length === 0) {
                        // Single locked recipient resolved from the record: when one
                        // exists but lacks the channel's contact point, say so clearly
                        // (it cannot be added/edited here); otherwise none is available.
                        if (this.recipients.length > 0) {
                            return this.primaryNeedsEmail() ? t.recipientNoEmail : t.recipientNoPhone;
                        }
                        return needMsg;
                    }
                }
                return "";
            };

            // Fields the user actually changed from their resolved/original value.
            Wizard.prototype.editedFields = function () {
                if (!this.fields) return [];
                var tpl = this.findTemplate();
                if (!tpl || !tpl.allowPrefillEdit) return [];
                return this.fields.filter(function (f) {
                    return f.editable && !f.readOnly && String(f.value) !== String(f.original === undefined ? f.value : f.original);
                });
            };

            Wizard.prototype.findTemplate = function () {
                var id = this.selectedTemplateId;
                return this.templates.filter(function (x) { return x.id === id; })[0];
            };

            // ----------------------------- submit / close -----------------------------
            Wizard.prototype.buildPayload = function () {
                var self = this;
                var tpl = this.findTemplate();
                // In role mode keep the role's sequence; otherwise number sequentially.
                var recipients = this.recipients
                    .filter(function (r) { return self.recipientReady(r); })
                    .map(function (r, i) {
                        return {
                            name: r.name,
                            email: r.email,
                            phone: r.phone || "",
                            sequence: self.roleMode && r.sequence ? r.sequence : i + 1,
                            roleName: r.roleName || "",
                            contactId: r.contactId || ""
                        };
                    });
                // Edited prefill values become Prefill overrides on the request.
                var fieldValues = this.editedFields().map(function (f) {
                    return { name: f.externalId, value: f.value, label: f.label, readOnly: !!f.readOnly };
                });
                var relatedContactId = this.ctx.entityName === "contact" ? this.ctx.recordId : "";
                // Channels actually used: the primary easydo channel is always on; the
                // selected additional channels are honoured only when multi-channel is on.
                var primary = this.settings.primaryChannel || "email";
                var channels = { email: false, sms: false, whatsapp: false };
                channels[primary] = true;
                if (this.settings.multiChannel) {
                    CHANNELS.forEach(function (ch) {
                        if (ch !== primary && self.channels[ch] && self.settings.allow[ch] && self.channelComplete(ch)) {
                            channels[ch] = true;
                        }
                    });
                }
                // Distribution declaration snapshot: per additional channel actually
                // selected, HOW the signing link is distributed (method + concrete
                // target) at send time. Stored on the request for governance.
                var declaration = null;
                if (this.settings.multiChannel) {
                    var decl = {};
                    CHANNELS.forEach(function (ch) {
                        if (ch === primary || !channels[ch] || !self.channelComplete(ch)) return;
                        var m = self.settings.method[ch];
                        decl[ch] = {
                            method: m,
                            journeyName: m === METHOD_CIJ ? self.settings.journey[ch] : "",
                            flowName: m === METHOD_FLOW ? self.settings.flowName[ch] : ""
                        };
                    });
                    for (var k in decl) { if (decl.hasOwnProperty(k)) { declaration = decl; break; } }
                }
                return {
                    templateId: this.demo ? "" : (tpl ? tpl.id : ""),
                    templateExternalId: tpl ? tpl.externalId : "",
                    isDraft: this.isDraft,
                    isRealtime: (!this.isDraft && this.isRealtime),
                    language: this.lang,
                    recipients: recipients,
                    fieldValues: fieldValues,
                    notifyEmails: recipients.map(function (r) { return { name: r.name, email: r.email }; }),
                    primaryChannel: primary,
                    channels: channels,
                    channelDeclaration: declaration,
                    launchEntityName: this.ctx.entityName,
                    launchRecordId: this.ctx.recordId,
                    relatedContactId: relatedContactId,
                    // Contact Center live-conversation context. When present the Send
                    // flow sets notify_platform = null (easydo stays silent) and the
                    // wizard pushes the link into the conversation instead.
                    ccConversationId: this.ctx.ccConversationId || "",
                    ccChannel: this.ctx.ccChannel || ""
                };
            };

            Wizard.prototype.submit = function () {
                var self = this;
                var t = DICT[this.lang];
                this.submitted = true;
                this.render();
                if (!this.xrm) {
                    this.submitted = false;
                    this.toast(false, t.sentErr + "Xrm");
                    this.render();
                    return;
                }
                var output = JSON.stringify({ action: "submit", nonce: Date.now(), payload: this.buildPayload() });
                this.xrm.WebApi.createRecord("alex_signaturerequest", { alex_wizardpayload: output }).then(
                    function (res) {
                        // Preview mode: keep the pane open, wait for the rendered PDF,
                        // then show it for approval before the real send.
                        if (self.isDraft) {
                            self.previewRequestId = res && res.id ? res.id.replace(/[{}]/g, "") : null;
                            self.previewState = "building";
                            self.previewUrl = null;
                            self.previewOpened = false;
                            self.previewError = "";
                            self.submitted = false;
                            self.render();
                            self.pollPreview(0);
                            return;
                        }
                        self.toast(true, t.sentOk);
                        // Real-time send: open the live signing panel and let the agent
                        // wait for the signed document, then close the wizard pane.
                        if (self.isRealtime) {
                            var rid = res && res.id ? res.id.replace(/[{}]/g, "") : null;
                            self.openRealtime(rid);
                            return;
                        }
                        // Contact Center send: the document was sent from a live
                        // conversation. Wait for the Send flow to store the signing link
                        // (alex_signinglink), then push it into the live channel so the
                        // customer gets it in the same thread instead of a separate notify.
                        if (self.ctx.ccConversationId) {
                            var ccRid = res && res.id ? res.id.replace(/[{}]/g, "") : null;
                            self.distributeToConversation(ccRid);
                            return;
                        }
                        window.setTimeout(function () { self.closePane(); }, 1100);
                    },
                    function (err) {
                        self.submitted = false;
                        self.toast(false, t.sentErr + (err && err.message ? err.message : ""));
                        self.render();
                    }
                );
            };

            // Open the live real-time signing panel (a separate web resource) as a
            // centered modal dialog, passing the request id, then close the wizard.
            Wizard.prototype.openRealtime = function (requestId) {
                var self = this;
                var t = DICT[this.lang];
                var done = function () { window.setTimeout(function () { self.closePane(); }, 600); };
                if (!requestId || !this.xrm || !this.xrm.Navigation || !this.xrm.Navigation.navigateTo) {
                    done();
                    return;
                }
                var pageInput = {
                    pageType: "webresource",
                    webresourceName: "alex_/html/realtimeSession.html",
                    data: "requestId=" + encodeURIComponent(requestId) + "&uilang=" + encodeURIComponent(this.lang)
                };
                var navOptions = {
                    target: 2, position: 1,
                    width: { value: 72, unit: "%" },
                    height: { value: 88, unit: "%" },
                    title: t.realtimeLabel
                };
                try {
                    this.xrm.Navigation.navigateTo(pageInput, navOptions).then(function () { }, function () { });
                } catch (e) { /* ignore */ }
                done();
            };

            // Poll the just-created request until the Send flow's preview branch has
            // generated the draft form (alex_ispreviewgenerated) and stored the easydo
            // viewer link (alex_previewurl) for review.
            Wizard.prototype.pollPreview = function (attempt) {
                var self = this;
                var t = DICT[this.lang];
                if (!this.previewRequestId || this.previewState !== "building") return;
                if (attempt > 40) { // ~2 minutes at 3s
                    this.previewState = "error";
                    this.previewError = t.previewUnavailable;
                    this.render();
                    return;
                }
                var sel = "?$select=alex_ispreviewgenerated,alex_previewurl,alex_status";
                this.xrm.WebApi.retrieveRecord("alex_signaturerequest", this.previewRequestId, sel).then(
                    function (rec) {
                        if (self.previewState !== "building") return;
                        // Failed status (626210008) aborts the wait.
                        if (rec && rec.alex_status === 626210008) {
                            self.previewState = "error";
                            self.previewError = t.previewUnavailable;
                            self.render();
                            return;
                        }
                        if (rec && rec.alex_ispreviewgenerated === true && rec.alex_previewurl) {
                            self.previewUrl = rec.alex_previewurl;
                            self.previewState = "ready";
                            self.render();
                            return;
                        }
                        window.setTimeout(function () { self.pollPreview(attempt + 1); }, 3000);
                    },
                    function () {
                        window.setTimeout(function () { self.pollPreview(attempt + 1); }, 3000);
                    }
                );
            };

            // Contact Center distribution: poll the just-created request until the
            // Send flow stores the easydo signing link (alex_signinglink), then push
            // that link into the live conversation via the Omnichannel client API.
            // toSendBox follows the alex_ccagentreview setting: when on, the link lands
            // in the agent sendbox for review; when off, it is sent straight to the
            // customer. The wizard keeps the conversation id from its launch context,
            // so no field has to be stored on the request for this to work.
            Wizard.prototype.distributeToConversation = function (requestId) {
                var t = DICT[this.lang];
                if (!requestId || !this.xrm) { this.closePane(); return; }
                this.toast(true, t.ccSending);
                this.pollSigningLink(requestId, 0);
            };

            Wizard.prototype.pollSigningLink = function (requestId, attempt) {
                var self = this;
                var t = DICT[this.lang];
                if (attempt > 40) { // ~2 minutes at 3s
                    self.toast(false, t.ccSentErr + t.previewUnavailable);
                    window.setTimeout(function () { self.closePane(); }, 2000);
                    return;
                }
                var sel = "?$select=alex_signinglink,alex_status";
                this.xrm.WebApi.retrieveRecord("alex_signaturerequest", requestId, sel).then(
                    function (rec) {
                        // Failed status (626210008) aborts the wait.
                        if (rec && rec.alex_status === 626210008) {
                            self.toast(false, t.ccSentErr + t.previewUnavailable);
                            window.setTimeout(function () { self.closePane(); }, 2000);
                            return;
                        }
                        if (rec && rec.alex_signinglink) {
                            self.pushLinkToConversation(rec.alex_signinglink);
                            return;
                        }
                        window.setTimeout(function () { self.pollSigningLink(requestId, attempt + 1); }, 3000);
                    },
                    function () {
                        window.setTimeout(function () { self.pollSigningLink(requestId, attempt + 1); }, 3000);
                    }
                );
            };

            // Wrap the signing link in the admin-defined message template. The
            // placeholder {link} or {קישור} is replaced with the URL; with no
            // placeholder the link is appended; with no template the raw link is sent.
            Wizard.prototype.buildCcMessage = function (link) {
                var tpl = (this.settings && this.settings.ccMessageTemplate) || "";
                tpl = ("" + tpl).replace(/^\s+|\s+$/g, "");
                if (!tpl) return link;
                if (tpl.indexOf("{link}") !== -1 || tpl.indexOf("{\u05e7\u05d9\u05e9\u05d5\u05e8}") !== -1) {
                    return tpl.split("{link}").join(link).split("{\u05e7\u05d9\u05e9\u05d5\u05e8}").join(link);
                }
                return tpl + "\n" + link;
            };

            Wizard.prototype.pushLinkToConversation = function (link) {
                var self = this;
                var t = DICT[this.lang];
                var oc = getOmnichannel();
                var cid = this.ctx.ccConversationId;
                // ccAgentReview on => land in the agent sendbox (review); off => send directly.
                var toSendBox = this.settings.ccAgentReview !== false;
                if (!oc || !oc.sendMessageToConversation || !cid) {
                    self.toast(false, t.ccSentErr);
                    window.setTimeout(function () { self.closePane(); }, 2000);
                    return;
                }
                try {
                    var msg = self.buildCcMessage(link);
                    Promise.resolve(oc.sendMessageToConversation(msg, toSendBox, cid)).then(
                        function () {
                            self.toast(true, toSendBox ? t.ccReviewOk : t.ccSentOk);
                            window.setTimeout(function () { self.closePane(); }, 1400);
                        },
                        function (err) {
                            self.toast(false, t.ccSentErr + (err && err.message ? err.message : ""));
                            window.setTimeout(function () { self.closePane(); }, 2500);
                        }
                    );
                } catch (e) {
                    self.toast(false, t.ccSentErr + (e && e.message ? e.message : ""));
                    window.setTimeout(function () { self.closePane(); }, 2500);
                }
            };
            // plus Approve/Back actions.
            Wizard.prototype.buildPreview = function (t) {
                var self = this;
                var wrap = el("div", { "class": "edo-wz-preview" });
                if (this.previewState === "building") {
                    var busy = el("div", { "class": "edo-wz-preview-busy" }, [
                        el("div", { "class": "edo-wz-spin" }),
                        el("div", { "class": "edo-wz-preview-busy-title", text: t.previewBuilding }),
                        el("div", { text: t.previewBuildingHint })
                    ]);
                    wrap.appendChild(busy);
                    return wrap;
                }
                if (this.previewState === "error") {
                    wrap.appendChild(el("div", { "class": "edo-wz-preview-busy" }, [
                        el("div", { "class": "edo-wz-err", text: this.previewError || t.previewUnavailable })
                    ]));
                    wrap.appendChild(this.buildPreviewFooter(t, false));
                    return wrap;
                }
                // ready
                wrap.appendChild(el("div", { "class": "edo-wz-step-head" }, [
                    el("div", { "class": "edo-wz-step-title", text: t.previewHeading }),
                    el("div", { "class": "edo-wz-step-hint", text: t.previewHint })
                ]));
                var frame = el("div", { "class": "edo-wz-preview-frame" });
                if (this.previewUrl) {
                    // Auto-open the viewer in a new tab once.
                    if (!this.previewOpened) {
                        this.previewOpened = true;
                        try { window.open(this.previewUrl, "_blank", "noopener"); } catch (e) { }
                    }
                    var openBtn = el("button", { "class": "edo-wz-btn primary", text: t.previewOpen });
                    openBtn.onclick = function () { try { window.open(self.previewUrl, "_blank", "noopener"); } catch (e) { } };
                    frame.appendChild(el("div", { "class": "edo-wz-preview-open" }, [
                        openBtn,
                        el("div", { "class": "edo-wz-step-hint", text: t.previewOpenHint })
                    ]));
                } else {
                    frame.appendChild(el("div", { "class": "edo-wz-preview-busy" }, [
                        el("div", { "class": "edo-wz-err", text: t.previewUnavailable })
                    ]));
                }
                wrap.appendChild(frame);
                wrap.appendChild(this.buildPreviewFooter(t, true));
                return wrap;
            };

            Wizard.prototype.buildPreviewFooter = function (t, ready) {
                var self = this;
                var back = el("button", { "class": "edo-wz-btn ghost", text: t.previewBack });
                back.onclick = function () { self.cancelPreview(); };
                var nav = el("div", { "class": "edo-wz-foot-nav" }, [back]);
                if (ready) {
                    var approve = el("button", { "class": "edo-wz-btn primary", text: this.submitted ? t.sending : t.previewApprove });
                    if (this.submitted) approve.classList.add("disabled");
                    approve.onclick = function () { self.approvePreview(); };
                    nav.appendChild(approve);
                }
                return el("div", { "class": "edo-wz-footer" }, [
                    el("div", { "class": "edo-wz-foot-start" }, []),
                    nav
                ]);
            };

            // Abandon the preview and return to the wizard. The draft request stays
            // in Draft status (not sent); a fresh submit creates a new request.
            Wizard.prototype.cancelPreview = function () {
                this.previewState = null;
                this.previewUrl = null;
                this.previewOpened = false;
                this.previewError = "";
                var stale = this.previewRequestId;
                this.previewRequestId = null;
                this.submitted = false;
                this.step = this.computeSteps().length - 1; // back to review
                this.render();
                // Best-effort: cancel the orphaned draft so it doesn't linger.
                if (stale && this.xrm) {
                    this.xrm.WebApi.updateRecord("alex_signaturerequest", stale, { alex_status: 626210009 }).then(function () { }, function () { });
                }
            };

            // Approve the preview: flip the SAME request out of draft mode and arm it
            // for the real send. The Send flow's send branch fires and notifies.
            Wizard.prototype.approvePreview = function () {
                var self = this;
                var t = DICT[this.lang];
                if (!this.previewRequestId || !this.xrm) return;
                this.submitted = true;
                this.render();
                this.xrm.WebApi.updateRecord("alex_signaturerequest", this.previewRequestId, {
                    alex_isdraft: false,
                    alex_status: 626210001
                }).then(
                    function () {
                        self.toast(true, t.sentOk);
                        window.setTimeout(function () { self.closePane(); }, 1100);
                    },
                    function (err) {
                        self.submitted = false;
                        self.toast(false, t.sentErr + (err && err.message ? err.message : ""));
                        self.render();
                    }
                );
            };


            Wizard.prototype.toast = function (ok, msg) {
                this._toast = el("div", { "class": "edo-wz-toast " + (ok ? "ok" : "bad") + " show", text: msg });
                if (this.root && !this.submitted) this.render();
                else if (this.root) this.root.appendChild(this._toast);
            };

            Wizard.prototype.closePane = function () {
                try {
                    var X = this.xrm || getXrm();
                    if (X && X.App && X.App.sidePanes) {
                        var pane = this.ctx.paneId ? X.App.sidePanes.getPane(this.ctx.paneId) : X.App.sidePanes.getSelectedPane();
                        if (pane) { pane.close(); return; }
                    }
                } catch (e) { }
            };

            function boot() {
                var root = document.getElementById("edo-root");
                var wz = new Wizard(root);
                window.__edoWizard = wz;
                wz.start();
            }

            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", boot);
            } else {
                boot();
            }
        })();
    </script>
</body>
</html>
